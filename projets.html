<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dim MBOLOKALA - Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-gray-dark': '#707070',
                        'brand-gray-light': '#D9D9D9',
                        'brand-beige': '#EBE7C9',
                        'brand-red': '#EF231C',
                        'brand-purple': '#5E3BEE',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-fade-up { animation: fadeInUp 0.8s ease-out forwards; }
        .animate-slide-left { animation: slideInLeft 0.8s ease-out forwards; }
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
    </style>
</head>
<body class="bg-brand-gray-light text-black antialiased font-sans flex flex-col min-h-screen">
    <header class="bg-brand-gray-dark text-white px-6 py-6 md:px-12 flex flex-col md:flex-row justify-between items-center sticky top-0 z-50 shadow-lg">
         <h1 class="text-2xl md:text-3xl font-bold tracking-tight animate-slide-left">Dim MBOLOKALA</h1>
        <nav class="mt-4 md:mt-0">

                <li><a href="#" class="hover:text-gray-300 transition duration-300">Contact</a></li>
            </ul>
        </nav>
    </header>

    <footer>

</body>
</html>
